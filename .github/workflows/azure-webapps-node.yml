name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Must match your App Service name in Azure Portal (case-sensitive)
  AZURE_WEBAPP_NAME: RentAutomation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build client and install server dependencies
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      # Requires repository secret: AZURE_WEBAPP_PUBLISH_PROFILE
      # Azure Portal → Web App → Get publish profile → paste full XML into GitHub secret
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
