name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Must match your App Service name in Azure Portal
  AZURE_WEBAPP_NAME: RentAutomation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build client and install server dependencies
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Require Azure publish profile secret
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' }}
        run: |
          echo "::error::Missing GitHub secret AZURE_WEBAPP_PUBLISH_PROFILE."
          echo "1. Azure Portal → your Web App → Get publish profile (download XML)"
          echo "2. GitHub → repo Settings → Secrets and variables → Actions → New repository secret"
          echo "3. Name: AZURE_WEBAPP_PUBLISH_PROFILE — paste entire XML file contents"
          echo "4. Re-run this workflow"
          exit 1

      - name: Deploy to Azure Web App
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
