name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Must match App Service name in Azure (resource: rentautomation)
  AZURE_WEBAPP_NAME: rentautomation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build client and install server dependencies
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Slim deploy package (faster upload)
        run: |
          rm -rf client/node_modules client/src client/.next client/out

      # Secret: AZURE_WEBAPP_PUBLISH_PROFILE — download from Production slot only
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
